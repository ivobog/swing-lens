services:
  postgres:
    image: postgres:16
    container_name: swinglens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: swinglens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - swinglens-postgres-data:/var/lib/postgresql/data

volumes:
  swinglens-postgres-data:
